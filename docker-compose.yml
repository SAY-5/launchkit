services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: launchkit
      POSTGRES_PASSWORD: launchkit
      POSTGRES_DB: launchkit
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U launchkit"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://launchkit:launchkit@db:5432/launchkit
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      PROVIDER_MODE: ${PROVIDER_MODE:-fake}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-price_test}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build: ./web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  db_data:
