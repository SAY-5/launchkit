name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: ruff check app tests
      - run: mypy app
      - run: pytest --cov=app --cov-fail-under=90

  bench-regress:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: python -m bench.check_regression

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start the stack
        run: docker compose up --build -d
      - name: Wait for the API
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/health >/dev/null; then
              echo "api ready"; break
            fi
            sleep 2
          done
          curl -fsS http://localhost:8000/health
      - name: Wait for the web app
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000 >/dev/null; then
              echo "web ready"; break
            fi
            sleep 2
          done
          curl -fsS http://localhost:3000 >/dev/null
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install Playwright
        working-directory: web
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run e2e
        working-directory: web
        env:
          E2E_BASE_URL: http://localhost:3000
        run: npm run e2e
      - name: Compose logs on failure
        if: failure()
        run: docker compose logs

  build-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t launchkit-api ./backend
      - name: Build web image
        run: docker build -t launchkit-web ./web
